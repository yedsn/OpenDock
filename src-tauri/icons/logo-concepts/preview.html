<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenDock Logo Concepts</title>
  <style>
    :root { color: #111827; background: #f3f4f6; font-family: Inter, "Segoe UI", Arial, sans-serif; }
    body { margin: 0; padding: 40px; }
    h1 { margin: 0 0 24px; font-size: 24px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; max-width: 1120px; }
    .item { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 18px; }
    img { display: block; width: 100%; aspect-ratio: 1; border-radius: 24px; }
    h2 { margin: 14px 0 6px; font-size: 15px; }
    p { margin: 0; color: #4b5563; font-size: 13px; line-height: 1.45; }
  </style>
</head>
<body>
  <h1>OpenDock Logo Concepts</h1>
  <main class="grid">
    <section class="item"><img src="opendock-o-dock-v1-balanced.svg" alt="Balanced O Dock" /><h2>V1 Balanced</h2><p>最稳妥的 O + Dock，适合正式 App 图标。</p></section>
    <section class="item"><img src="opendock-o-dock-v2-open-gap.svg" alt="Open Gap O Dock" /><h2>V2 Open Gap</h2><p>右上角打开动作更明显，强调启动和跳转。</p></section>
    <section class="item"><img src="opendock-o-dock-v3-minimal.svg" alt="Minimal O Dock" /><h2>V3 Minimal</h2><p>浅色、极简、高对比，适合文档和品牌展示。</p></section>
    <section class="item"><img src="opendock-o-dock-v4-dock-tray.svg" alt="Dock Tray O" /><h2>V4 Dock Tray</h2><p>底座更像托盘，集合/收纳语义更强。</p></section>
    <section class="item"><img src="opendock-o-dock-v5-brand-mark.svg" alt="Brand Mark O Dock" /><h2>V5 Brand Mark</h2><p>更品牌化，保留打开缺口但不直接画箭头。</p></section>
  </main>
</body>
</html>
